<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Wiadomości</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; }
        #auth-screen, #main-app, #chat-view { padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #main-app, #chat-view { display: none; }
        .item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .item-text { flex-grow: 1; overflow: hidden; }
        .item-title { font-weight: bold; font-size: 17px; }
        .item-preview { color: #888; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
        input { padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 16px; }
        button { padding: 12px; background: #007AFF; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 16px; word-wrap: break-word; display: flex; flex-direction: column; position: relative; }
        .sent { background: #34C759; align-self: flex-end; color: white; }
        .received { background: #333; align-self: flex-start; color: white; }
        .meta { font-size: 10px; margin-top: 4px; opacity: 0.7; text-align: right; }
        #reply-panel { display: none; background: #1c1c1e; border-left: 4px solid #34C759; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        #typing-status { font-size: 12px; color: #34C759; height: 15px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="auth-screen" style="display:flex;">
        <h2>Logowanie</h2>
        <input type="text" id="username" placeholder="Nazwa">
        <input type="text" id="phone" placeholder="Numer telefonu">
        <button onclick="login()">Zaloguj się</button>
    </div>
    <div id="main-app">
        <h1 style="margin-top: 0;">Wiadomości</h1>
        <div id="list"></div>
        <button onclick="openModal()" style="margin-top: 20px;">+ Dodaj kontakt</button>
    </div>
    <div id="chat-view">
        <button onclick="exitChat()" style="width: 80px;">← Wstecz</button>
        <h2 id="chat-title" style="text-align: center; margin: 5px 0;"></h2>
        <div id="typing-status"></div>
        <div id="messages"></div>
        <div id="reply-panel">
            <button onclick="cancelReply()" style="float:right; background:none; border:none; color:#888;">✕</button>
            <div id="reply-preview" style="font-size:12px; color:#aaa;"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="msgInput" placeholder="Napisz..." style="flex-grow: 1; margin-bottom: 0;" oninput="setTyping(true)">
            <button onclick="sendMsg()">Wyślij</button>
        </div>
    </div>
    <div id="modal" style="display:none; position:fixed; top:20%; left:10%; width:80%; background:#1c1c1e; padding:20px; border-radius:20px;">
        <h3>Dodaj kontakt</h3>
        <input type="text" id="newName" placeholder="Nazwa" style="width:100%; box-sizing:border-box;">
        <input type="text" id="newPhone" placeholder="Numer" style="width:100%; box-sizing:border-box;">
        <button onclick="saveContact()" style="width:100%;">Dodaj</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAetQLNfeS69hofKicFsN_BeaqslnL9Ows", authDomain: "sms123-454d3.firebaseapp.com", databaseURL: "https://sms123-454d3-default-rtdb.firebaseio.com", projectId: "sms123-454d3", storageBucket: "sms123-454d3.firebasestorage.app", messagingSenderId: "607529107448", appId: "1:607529107448:web:7ae2547a16af919cc5a00d", measurementId: "G-RK0TP4NDV1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentChatPhone = null, replyingTo = null, typingTimer;

        function login() { const n = document.getElementById('username').value; const p = document.getElementById('phone').value; if(!n || !p) return; db.ref('users/' + p).set({name: n, phone: p}).then(() => { localStorage.setItem('myPhone', p); showApp(); }); }
        function showApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; renderContacts(); }
        function exitChat() { db.ref().off(); document.getElementById('chat-view').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; renderContacts(); }
        
        function setTyping(val) { 
            db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_') + '/typing').set(val ? localStorage.getItem('myPhone') : null);
            clearTimeout(typingTimer); typingTimer = setTimeout(() => db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_') + '/typing').set(null), 3000);
        }

        function renderContacts() {
            db.ref().off();
            db.ref('users/' + localStorage.getItem('myPhone') + '/contacts').on('value', snap => {
                const list = document.getElementById('list'); list.innerHTML = '';
                Object.values(snap.val() || {}).forEach(c => {
                    const chatId = [localStorage.getItem('myPhone'), c.phone].sort().join('_');
                    db.ref('chats/' + chatId).limitToLast(1).on('value', s => {
                        const m = s.val() ? Object.values(s.val())[0] : null;
                        list.innerHTML += `<div class="item" onclick="enterChat('${c.phone}', '${c.name}')"><div class="item-text"><div class="item-title">${c.name}</div><div class="item-preview">${m && m.text ? m.text : 'Brak'}</div></div></div>`;
                    });
                });
            });
        }

        function enterChat(phone, name) {
            currentChatPhone = phone; 
            document.getElementById('main-app').style.display = 'none'; 
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            const chatId = [localStorage.getItem('myPhone'), phone].sort().join('_');
            
            db.ref('chats/' + chatId + '/typing').on('value', s => document.getElementById('typing-status').innerText = s.val() && s.val() !== localStorage.getItem('myPhone') ? "Pisze..." : "");
            
            db.ref('chats/' + chatId).on('value', snap => {
                const msgsDiv = document.getElementById('messages'); msgsDiv.innerHTML = '';
                const updates = {};
                Object.keys(snap.val() || {}).forEach(key => {
                    if (key === 'typing') return;
                    const m = snap.val()[key];
                    if (!m.text) return;
                    
                    if (m.from !== localStorage.getItem('myPhone') && !m.read) updates[key + '/read'] = true;
                    
                    const isMine = m.from === localStorage.getItem('myPhone');
                    const div = document.createElement('div');
                    div.className = `msg ${isMine ? 'sent' : 'received'}`;
                    div.innerHTML = `${m.replyTo ? `<div style="font-size:10px; border-left:2px solid #fff; padding-left:5px;">Odp: ${m.replyTo.text}</div>` : ''}${m.text}<div class="meta">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${isMine ? (m.read ? "✓✓" : "✓") : ""}</div>`;
                    
                    let startX; div.ontouchstart = e => startX = e.touches[0].clientX;
                    div.ontouchend = e => { if(Math.abs(startX - e.changedTouches[0].clientX) > 50) { replyingTo = {text: m.text}; document.getElementById('reply-panel').style.display = 'block'; document.getElementById('reply-preview').innerText = m.text; } };
                    msgsDiv.appendChild(div);
                });
                if(Object.keys(updates).length > 0) db.ref('chats/' + chatId).update(updates);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        function cancelReply() { document.getElementById('reply-panel').style.display = 'none'; replyingTo = null; }
        function sendMsg() { 
            const input = document.getElementById('msgInput'); if(!input.value.trim()) return; 
            db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_')).push({ text: input.value, from: localStorage.getItem('myPhone'), timestamp: Date.now(), read: false, replyTo: replyingTo }); 
            input.value = ''; cancelReply();
        }
        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function saveContact() { 
            const p = document.getElementById('newPhone').value;
            if(!p) return;
            db.ref('users/' + localStorage.getItem('myPhone') + '/contacts/' + p).set({name: document.getElementById('newName').value || p, phone: p}); 
            location.reload(); 
        }
        if (localStorage.getItem('myPhone')) showApp();
    </script>
</body>
</html>
