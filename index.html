<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Wiadomości Liquid Glass</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: radial-gradient(circle at 50% -20%, #293650 0%, #0a0d14 70%); --text: #ffffff; --panel-bg: rgba(255, 255, 255, 0.08); --panel-blur: blur(20px) saturate(180%); --panel-border: 1px solid rgba(255, 255, 255, 0.1); --acc-color: #5ac8fa; }
        body.light { --bg: linear-gradient(180deg, #eef2f5 0%, #ffffff 100%); --text: #1c1c1e; --panel-bg: rgba(255, 255, 255, 0.7); --panel-border: 1px solid rgba(0, 0, 0, 0.05); --acc-color: #007aff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; height: 100vh; overflow: hidden; transition: 0.5s; }
        #auth-screen, #main-app, #chat-view, #settings-view { padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #main-app, #chat-view, #settings-view { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin: 20px 0; }
        #list { background: var(--panel-bg); backdrop-filter: var(--panel-blur); border-radius: 24px; border: var(--panel-border); overflow: hidden; }
        .item { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .item-title { font-size: 17px; font-weight: 700; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--acc-color); width: 64px; height: 64px; border-radius: 32px; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.2s; }
        .fab:active { transform: scale(0.9); }
        
        /* NAPRAWIONE: Klasy wiadomości */
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 20px; position: relative; backdrop-filter: blur(10px); margin-bottom: 8px; font-size: 15px; display: block; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.4; }
        .timestamp { font-size: 10px; opacity: 0.7; display: block; text-align: right; margin-top: 4px; }
        
        .sent { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #000; align-self: flex-end; }
        .received { background: var(--panel-bg); align-self: flex-start; border: var(--panel-border); }
        input { padding: 14px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: var(--text); }
        button { padding: 14px; background: var(--acc-color); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }
        .gear-icon { position: absolute; top: 25px; right: 25px; cursor: pointer; font-size: 28px; transition: 0.3s; color: var(--text); }
        .gear-icon:hover { transform: rotate(90deg); }
        #modal { transition: 0.3s cubic-bezier(0.17, 0.88, 0.32, 1.27); transform: scale(0.9); opacity: 0; pointer-events: none; }
        #modal.show { transform: scale(1); opacity: 1; pointer-events: auto; }
        .typing-indicator { position: absolute; bottom: 110px; left: 20px; display: flex; gap: 4px; padding: 10px; background: var(--panel-bg); border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 10; }
        .typing-indicator.active { opacity: 1; }
        .dot { width: 8px; height: 8px; background: var(--text); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        #reply-panel { display: none; background: var(--panel-bg); border-left: 4px solid var(--acc-color); padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="auth-screen" style="display:flex;"><h2>Logowanie</h2><input type="text" id="username" placeholder="Nazwa"><input type="text" id="phone" placeholder="Numer telefonu"><button onclick="login()">Zaloguj się</button></div>
    <div id="main-app"><i class="fas fa-cog gear-icon" onclick="showSettings()"></i><h1>Wiadomości</h1><div id="list"></div><div class="fab" onclick="toggleModal(true)">+</div></div>
    <div id="settings-view"><button onclick="hideSettings()" style="width: 80px; background:transparent; border:none; color:var(--acc-color);">← Wstecz</button><h2>Ustawienia</h2><p id="user-info" style="text-align: center;"></p><button onclick="toggleTheme()" style="width:100%;">Przełącz motyw</button></div>
    <div id="chat-view">
        <button onclick="exitChat()" style="width: 80px; background:transparent; border:none; color:var(--acc-color);">← Wstecz</button>
        <h2 id="chat-title"></h2>
        <div id="typing-indicator" class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="messages" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px 0;"></div>
        <div id="reply-panel">
            <span onclick="cancelReply()" style="float:right; cursor:pointer;">✕</span>
            <div id="reply-preview" style="color:var(--acc-color);"></div>
        </div>
        <div style="display: flex; gap: 10px;"><input type="text" id="msgInput" placeholder="Napisz..." style="flex-grow: 1;" oninput="setTyping()"><button onclick="sendMsg()">Wyślij</button></div>
    </div>
    <div id="modal" style="position:fixed; top:20%; left:10%; width:80%; background:var(--panel-bg); backdrop-filter:blur(20px); padding:20px; border-radius:24px; border:var(--panel-border);"><h3>Dodaj kontakt</h3><input type="text" id="newName" placeholder="Nazwa" style="width:100%; margin-bottom:10px;"><input type="text" id="newPhone" placeholder="Numer" style="width:100%; margin-bottom:10px;"><button onclick="saveContact()" style="width:100%;">Dodaj</button></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAetQLNfeS69hofKicFsN_BeaqslnL9Ows", authDomain: "sms123-454d3.firebaseapp.com", databaseURL: "https://sms123-454d3-default-rtdb.firebaseio.com", projectId: "sms123-454d3", storageBucket: "sms123-454d3.firebasestorage.app", messagingSenderId: "607529107448", appId: "1:607529107448:web:7ae2547a16af919cc5a00d", measurementId: "G-RK0TP4NDV1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentChatPhone, typingTimer, replyingTo = null;

        document.getElementById('messages').addEventListener('scroll', () => { if(document.activeElement.tagName === 'INPUT') document.activeElement.blur(); });

        function vibrate() { if(navigator.vibrate) navigator.vibrate(30); }
        function toggleModal(show) { document.getElementById('modal').className = show ? 'show' : ''; }
        function login() { const n = document.getElementById('username').value; const p = document.getElementById('phone').value; if(!n || !p) return; db.ref('users/' + p).set({name: n, phone: p}).then(() => { localStorage.setItem('myPhone', p); localStorage.setItem('myName', n); showApp(); }); }
        function toggleTheme() { document.body.classList.toggle('light'); }
        function showSettings() { 
            document.getElementById('main-app').style.display = 'none'; 
            document.getElementById('settings-view').style.display = 'flex'; 
            document.getElementById('user-info').innerText = "Nazwa: " + (localStorage.getItem('myName') || "Brak") + "\nNumer: " + localStorage.getItem('myPhone'); 
        }
        function hideSettings() { document.getElementById('settings-view').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; }
        function showApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; renderContacts(); }
        
        function renderContacts() {
            db.ref().off();
            db.ref('users/' + localStorage.getItem('myPhone') + '/contacts').on('value', snap => {
                const list = document.getElementById('list'); 
                if(!snap.val()) { list.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.5;"><i class="fas fa-comments" style="font-size:40px;"></i><p>Brak kontaktów</p></div>'; return; }
                list.innerHTML = '';
                Object.values(snap.val() || {}).forEach(c => {
                    list.innerHTML += `<div class="item" onclick="enterChat('${c.phone}', '${c.name}')"><div class="item-title">${c.name}</div></div>`;
                });
            });
        }

        function enterChat(phone, name) {
            currentChatPhone = phone; 
            document.getElementById('main-app').style.display = 'none'; 
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            cancelReply();
            
            const msgsDiv = document.getElementById('messages');
            msgsDiv.innerHTML = '';
            const chatId = [localStorage.getItem('myPhone'), phone].sort().join('_');
            
            db.ref('chats/' + chatId).off(); 
            db.ref('chats/' + chatId).on('child_added', child => {
                if (child.key === 'typing') return;
                const m = child.val();
                if (m.from !== localStorage.getItem('myPhone') && !m.read) child.ref.update({ read: true });
                
                const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const status = m.read ? '<i class="fas fa-check-double" style="color:#007aff;"></i>' : '<i class="fas fa-check"></i>';
                const div = document.createElement('div');
                div.className = `msg ${m.from === localStorage.getItem('myPhone') ? 'sent' : 'received'}`;
                div.innerHTML = `${m.replyTo ? `<div style="font-size:10px; opacity:0.7; margin-bottom:4px;">Odp: ${m.replyTo}</div>` : ''}${m.text}<span class="timestamp">${time} ${m.from === localStorage.getItem('myPhone') ? status : ''}</span>`;
                
                let startX;
                div.ontouchstart = e => startX = e.touches[0].clientX;
                div.ontouchend = e => { if(Math.abs(startX - e.changedTouches[0].clientX) > 50) { replyingTo = m.text; document.getElementById('reply-panel').style.display = 'block'; document.getElementById('reply-preview').innerText = m.text; } };
                
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });

            db.ref('chats/' + chatId + '/typing').on('value', snap => {
                document.getElementById('typing-indicator').className = 'typing-indicator ' + (snap.val() && snap.val() !== localStorage.getItem('myPhone') ? 'active' : '');
            });
        }

        function cancelReply() { replyingTo = null; document.getElementById('reply-panel').style.display = 'none'; }
        function exitChat() { 
            db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_')).off();
            document.getElementById('chat-view').style.display = 'none'; 
            document.getElementById('main-app').style.display = 'flex'; 
        }

        function sendMsg() { 
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;
            vibrate();
            db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_')).push({ text: text, from: localStorage.getItem('myPhone'), timestamp: Date.now(), read: false, replyTo: replyingTo });
            input.value = '';
            cancelReply();
        }

        function setTyping() { db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_') + '/typing').set(localStorage.getItem('myPhone')); clearTimeout(typingTimer); typingTimer = setTimeout(() => db.ref('chats/' + [localStorage.getItem('myPhone'), currentChatPhone].sort().join('_') + '/typing').set(null), 2000); }
        function saveContact() { db.ref('users/' + localStorage.getItem('myPhone') + '/contacts/' + document.getElementById('newPhone').value).set({name: document.getElementById('newName').value, phone: document.getElementById('newPhone').value}); toggleModal(false); }
        if (localStorage.getItem('myPhone')) showApp();
    </script>
</body>
</html>
